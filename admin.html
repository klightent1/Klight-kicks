<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klight Admin Panel</title>

<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  padding: 20px;
}

h1 {
  color: #e8ff47;
}

.order {
  background: #1a1a1a;
  border: 1px solid #333;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.order h3 {
  margin-bottom: 5px;
}

.status {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
}

.pending { background: orange; }
.delivered { background: green; }

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  background: #e8ff47;
}
</style>
</head>

<body>

<h1>📦 Klight Orders Dashboard</h1>

<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, getDocs, updateDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBppxK5_6DikJAHl7QqbrQxjdP8_P6cDBA",
  authDomain: "klight-f6067.firebaseapp.com",
  projectId: "klight-f6067",
  storageBucket: "klight-f6067.firebasestorage.app",
  messagingSenderId: "374626545204",
  appId: "1:374626545204:web:7bc79b81206aea8f3be461"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const container = document.getElementById("orders");

async function loadOrders() {
  container.innerHTML = "Loading orders...";

  const querySnapshot = await getDocs(collection(db, "orders"));
  container.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "order";

    div.innerHTML = `
      <h3>Order ID: ${data.orderId}</h3>
      <p><b>Name:</b> ${data.customer.name}</p>
      <p><b>Location:</b> ${data.customer.location}</p>
      <p><b>Phone:</b> ${data.customer.phone}</p>

      <p><b>Items:</b></p>
      <ul>
        ${data.items.map(i => `<li>${i.name} (${i.size}) - KSh ${i.price}</li>`).join("")}
      </ul>

      <p><b>Total:</b> KSh ${data.total}</p>

      <p>Status: 
        <span class="status ${data.status}">
          ${data.status}
        </span>
      </p>

      <button onclick="markDelivered('${docSnap.id}')">
        Mark as Delivered
      </button>
    `;

    container.appendChild(div);
  });
}

window.markDelivered = async function(id) {
  const ref = doc(db, "orders", id);
  await updateDoc(ref, { status: "delivered" });
  alert("✅ Updated!");
  loadOrders();
};

loadOrders();
</script>

</body>
</html>
