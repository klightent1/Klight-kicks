<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klight Kicks</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* NAVBAR */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 10px 20px;
}

.logo {
  font-weight: bold;
  font-size: 22px;
}

.search {
  flex: 1;
  margin: 0 20px;
}

.search input {
  width: 80%;
  padding: 10px;
}

.search button {
  padding: 10px;
  background: orange;
  border: none;
}

.nav-links {
  display: flex;
  gap: 15px;
}

/* MAIN LAYOUT */
.container {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  background: white;
  padding: 10px;
}

.sidebar div {
  padding: 10px;
  cursor: pointer;
}

.sidebar div:hover {
  background: #eee;
}

/* HERO */
.hero {
  flex: 1;
  padding: 10px;
}

.hero img {
  width: 100%;
  border-radius: 10px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
}

.card img {
  width: 100%;
}

button {
  background: orange;
  border: none;
  padding: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
  <div class="logo">Klight Kicks</div>

  <div class="search">
    <input type="text" placeholder="Search products...">
    <button>Search</button>
  </div>

  <div class="nav-links">
    <div>Account</div>
    <div>Help</div>
    <div>Cart 🛒</div>
  </div>
</div>

<!-- MAIN -->

<div class="container">

  <!-- SIDEBAR -->

  <div class="sidebar">
    <div>👟 Shoes</div>
    <div>👕 Clothing</div>
    <div>⌚ Accessories</div>
    <div>🔥 Deals</div>
  </div>

  <!-- HERO -->

  <div class="hero">
    <img src="https://via.placeholder.com/800x300?text=Big+Sale+Klight+Kicks">
  </div>

</div>

<!-- PRODUCTS -->

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Nike Air</p>
    <h4>$120</h4>
    <button>Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Adidas</p>
    <h4>$100</h4>
    <button>Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Puma</p>
    <h4>$90</h4>
    <button>Buy</button>
  </div>

</div>

</body>
</html>
