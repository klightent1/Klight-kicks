<script>
const SIZES   = ['UK 6','UK 7','UK 8','UK 9','UK 10','UK 11','UK 12'];
const PHONE   = '254721698932';
const DELIVERY = 300;

let products = [/* KEEP YOUR PRODUCTS ARRAY SAME */];

let filtered = [...products];
let cart = [];
let selectedProduct = null;

/* ── DISPLAY PRODUCTS (FIXED) ───────────────────────────── */
function displayProducts(){
  const c = document.getElementById("products");
  c.innerHTML = "";

  if(filtered.length === 0){
    c.innerHTML = `<div class="empty-state"><span class="emoji">🔍</span>No shoes found.</div>`;
    return;
  }

  filtered.forEach(p => {

    const oldPrice = Math.round(p.price * 1.25);
    const rating = (Math.random()*1 + 4).toFixed(1);

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="card-img-wrap">
        <img src="${p.images[0]}" alt="${p.name}">

        <span class="card-badge">${p.category}</span>

        <button class="quick-add" onclick="quickAdd(${p.id})">
          + Add
        </button>
      </div>

      <div class="card-body">
        <div class="rating">⭐ ${rating}</div>

        <h4>${p.name}</h4>

        <p class="price">
          KSh ${p.price.toLocaleString()}
        </p>

        <div style="text-decoration:line-through;color:#888;font-size:12px;">
          KSh ${oldPrice.toLocaleString()}
        </div>

        <small>${p.desc}</small>
      </div>
    `;

    // FIX: allow clicking card WITHOUT triggering quick add
    div.onclick = (e) => {
      if(!e.target.classList.contains("quick-add")){
        viewProduct(p.id);
      }
    };

    c.appendChild(div);
  });
}

/* ── QUICK ADD (NEW FEATURE) ───────────────────────────── */
function quickAdd(id){
  const product = products.find(p => p.id === id);

  // auto assign random size (fast UX like real stores)
  const randomSize = SIZES[Math.floor(Math.random()*SIZES.length)];

  cart.push({...product, size: randomSize});
  updateCartUI();
  showToast(`🛒 ${product.name} added (Size ${randomSize})`);
}

/* ── PRODUCT MODAL ─────────────────────────────────────── */
function viewProduct(id){
  closeProduct();

  const p = products.find(x => x.id === id);
  selectedProduct = p;

  const sizeOptions = SIZES.map(s => `<option value="${s}">${s}</option>`).join("");

  const overlay = document.createElement("div");
  overlay.id = "productModal";
  overlay.className = "modal-overlay";

  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-gallery">
        <img src="${p.images[0]}" id="mainImg" class="main-img">
      </div>
      <div class="modal-content">
        <h3>${p.name}</h3>
        <p class="modal-price">KSh ${p.price.toLocaleString()}</p>
        <p class="modal-desc">${p.desc}</p>

        <select id="modal-size" class="modal-select">
          <option value="" disabled selected>Select Size</option>
          ${sizeOptions}
        </select>

        <div class="modal-actions">
          <button class="btn-primary" onclick="addToCartFromModal()">🛒 Add to Cart</button>
          <button class="btn-secondary" onclick="closeProduct()">Close</button>
        </div>
      </div>
    </div>`;

  overlay.onclick = (e) => { if(e.target === overlay) closeProduct(); };
  document.body.appendChild(overlay);
}

function closeProduct(){
  document.getElementById("productModal")?.remove();
}

function addToCartFromModal(){
  const size = document.getElementById("modal-size").value;

  if(!size){
    showToast("⚠️ Select size");
    return;
  }

  cart.push({...selectedProduct, size});
  updateCartUI();
  closeProduct();
  showToast(`✅ Added to cart`);
}

/* ── FILTER ───────────────────────────────────────────── */
function filterCategory(cat, btn){
  filtered = cat === "all" ? [...products] : products.filter(p => p.category === cat);
  displayProducts();

  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

/* ── SEARCH ───────────────────────────────────────────── */
function searchProducts(){
  const q = document.getElementById("search").value.toLowerCase();

  filtered = q
    ? products.filter(p => p.name.toLowerCase().includes(q))
    : [...products];

  displayProducts();
}

/* ── CART ───────────────────────────────────────────── */
function updateCartUI(){
  let subtotal = 0;
  const wrap = document.getElementById("cart-items");
  wrap.innerHTML = "";

  if(cart.length === 0){
    wrap.innerHTML = `<div class="cart-empty">Empty cart</div>`;
  } else {
    cart.forEach((p, i) => {
      subtotal += p.price;

      wrap.innerHTML += `
        <div class="cart-item">
          <div>
            <strong>${p.name}</strong>
            <small>${p.size}</small>
          </div>
          <span>KSh ${p.price}</span>
          <button onclick="removeFromCart(${i})">✕</button>
        </div>`;
    });
  }

  const total = subtotal + DELIVERY;

  document.getElementById("subtotal").innerText = subtotal;
  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = cart.length;
  document.getElementById("cart-count-2").innerText = cart.length;
  document.getElementById("checkout-btn").disabled = cart.length === 0;
}

function removeFromCart(i){
  cart.splice(i,1);
  updateCartUI();
}

/* ── CHECKOUT ───────────────────────────────────────── */
function checkout(){
  const name = document.getElementById("cust-name").value;
  const location = document.getElementById("cust-location").value;

  if(!name || !location){
    showToast("Fill all fields");
    return;
  }

  let msg = `ORDER\n${name}\n${location}\n`;

  cart.forEach(p=>{
    msg += `${p.name} (${p.size}) - ${p.price}\n`;
  });

  window.open("https://wa.me/" + PHONE + "?text=" + encodeURIComponent(msg));
}

/* ── TOAST ─────────────────────────────────────────── */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function scrollToCart(){
  document.getElementById('cart-sidebar').scrollIntoView({behavior:'smooth'});
}

/* ── INIT ─────────────────────────────────────────── */
displayProducts();
updateCartUI();
</script>
