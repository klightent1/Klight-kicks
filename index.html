<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klight Kicks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --accent: #e8ff47;
    --accent2: #ff4747;
    --text: #f0f0f0;
    --muted: #888;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; height: 60px;
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 28px; letter-spacing: 2px;
    color: var(--accent);
  }
  .nav-logo span { color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .cart-btn {
    background: var(--accent); color: #000;
    border: none; border-radius: 8px;
    padding: 8px 16px; font-family: var(--font-body);
    font-weight: 600; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s;
  }
  .cart-btn:hover { opacity: 0.85; }
  .cart-badge {
    background: #000; color: var(--accent);
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  /* HERO */
  .hero {
    padding: 3rem 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(48px, 10vw, 96px);
    line-height: 0.95; letter-spacing: 2px;
    color: var(--text);
  }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p { color: var(--muted); margin-top: 0.75rem; font-size: 15px; }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 16px;
    font-family: var(--font-body); font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent); color: #000;
    border-color: var(--accent); font-weight: 600;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: calc(100vh - 61px);
  }

  /* PRODUCTS */
  .products-wrap { padding: 1.5rem; border-right: 1px solid var(--border); }
  #products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }
  .empty-state {
    grid-column: 1/-1;
    text-align: center; padding: 4rem 0;
    color: var(--muted); font-size: 15px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(232,255,71,0.3); }
  .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #1a1a1a; }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s;
  }
  .card:hover .card-img-wrap img { transform: scale(1.05); }
  .card-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--accent); color: #000;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 4px;
  }
  .card-badge.hot { background: var(--accent2); color: #fff; }
  .card-badge.sale { background: #47d4ff; color: #000; }
  .quick-add {
    position: absolute; bottom: 10px; right: 10px;
    background: var(--accent); color: #000;
    border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 12px; font-weight: 600;
    cursor: pointer; opacity: 0;
    transition: opacity 0.2s;
    font-family: var(--font-body);
  }
  .card:hover .quick-add { opacity: 1; }
  .card-body { padding: 0.875rem; }
  .rating { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .card-body h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
  .price { font-size: 16px; font-weight: 700; color: var(--accent); }
  .old-price { font-size: 12px; color: var(--muted); text-decoration: line-through; margin-top: 2px; }
  .card-body small { font-size: 11px; color: #e87547; display: block; margin-top: 6px; }

  /* SIZE MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 360px;
  }
  .modal h3 { font-family: var(--font-display); font-size: 22px; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
  .size-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 1rem;
  }
  .size-btn {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 0; font-size: 13px; font-weight: 500;
    cursor: pointer; text-align: center; transition: all 0.15s;
    font-family: var(--font-body);
  }
  .size-btn:hover { border-color: var(--accent); color: var(--accent); }
  .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; }
  .btn-confirm {
    flex: 1; background: var(--accent); color: #000;
    border: none; border-radius: 8px; padding: 12px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    font-family: var(--font-body); transition: opacity 0.2s;
  }
  .btn-confirm:hover { opacity: 0.85; }
  .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-cancel {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; cursor: pointer;
    font-family: var(--font-body); font-size: 14px;
  }
  .btn-cancel:hover { color: var(--text); }

  /* CART SIDEBAR */
  .cart-sidebar {
    position: sticky; top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto; padding: 1.25rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .cart-sidebar h2 {
    font-family: var(--font-display);
    font-size: 24px; letter-spacing: 1px;
    display: flex; align-items: center; gap: 8px;
  }
  .cart-count-badge {
    background: var(--accent); color: #000;
    border-radius: 50%; width: 24px; height: 24px;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-body);
  }
  #cart-items { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .cart-empty {
    color: var(--muted); font-size: 14px;
    text-align: center; padding: 2rem 0;
  }
  .cart-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .cart-item > div { flex: 1; }
  .cart-item strong { font-size: 13px; display: block; }
  .cart-item small { color: var(--muted); font-size: 11px; }
  .cart-item span { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .cart-item button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 2px 4px;
    transition: color 0.15s;
  }
  .cart-item button:hover { color: var(--accent2); }

  /* TOTALS */
  .cart-totals {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem;
  }
  .totals-row {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--muted); margin-bottom: 6px;
  }
  .totals-row.total {
    font-size: 16px; font-weight: 700;
    color: var(--text); margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border); margin-bottom: 0;
  }

  /* CHECKOUT FORM */
  .checkout-form { display: flex; flex-direction: column; gap: 8px; }
  .checkout-form input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    color: var(--text); font-family: var(--font-body); font-size: 13px;
    transition: border-color 0.2s; outline: none; width: 100%;
  }
  .checkout-form input:focus { border-color: var(--accent); }
  .checkout-form input::placeholder { color: var(--muted); }
  #checkout-btn {
    background: #25D366; color: #fff;
    border: none; border-radius: 8px; padding: 12px;
    font-family: var(--font-body); font-weight: 700; font-size: 14px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 6px; transition: opacity 0.2s;
  }
  #checkout-btn:hover:not(:disabled) { opacity: 0.85; }
  #checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .delivery-note { font-size: 11px; color: var(--muted); text-align: center; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px;
    border-radius: 100px; font-size: 13px; font-weight: 500;
    white-space: nowrap; z-index: 300;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .cart-sidebar {
      position: static; height: auto;
      border-top: 1px solid var(--border);
    }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">KLIGHT <span>KICKS</span></div>
  <div class="nav-right">
    <button class="cart-btn" onclick="document.querySelector('.cart-sidebar').scrollIntoView({behavior:'smooth'})">
      🛒 Cart <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>STEP INTO <em>FIRE</em><br>FOOTWEAR</h1>
  <p>Premium sneakers & shoes — Nairobi delivery from KSh 300</p>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
  <button class="filter-btn" onclick="filterProducts('nike', this)">Nike</button>
  <button class="filter-btn" onclick="filterProducts('adidas', this)">Adidas</button>
  <button class="filter-btn" onclick="filterProducts('jordan', this)">Jordan</button>
  <button class="filter-btn" onclick="filterProducts('leather', this)">Leather</button>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- PRODUCTS -->
  <div class="products-wrap">
    <div id="products"></div>
  </div>

  <!-- CART SIDEBAR -->
  <aside class="cart-sidebar">
    <h2>Cart <span class="cart-count-badge" id="cart-count-2">0</span></h2>

    <div id="cart-items"></div>

    <div class="cart-totals">
      <div class="totals-row"><span>Subtotal</span><span>KSh <span id="subtotal">0</span></span></div>
      <div class="totals-row"><span>Delivery</span><span>KSh 300</span></div>
      <div class="totals-row total"><span>Total</span><span>KSh <span id="total">0</span></span></div>
    </div>

    <div class="checkout-form">
      <input id="cust-name" type="text" placeholder="Your name" autocomplete="name">
      <input id="cust-location" type="text" placeholder="Delivery location" autocomplete="street-address">
      <input id="cust-phone" type="tel" placeholder="Phone number" autocomplete="tel">
      <button id="checkout-btn" onclick="checkout()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
        Order via WhatsApp
      </button>
      <p class="delivery-note">📲 M-Pesa STK push sent to your phone · Order confirmed on WhatsApp</p>
    </div>
  </aside>
</div>

<!-- SIZE PICKER MODAL -->
<div class="modal-overlay" id="size-modal">
  <div class="modal">
    <h3 id="modal-product-name">Nike Air Force 1</h3>
    <p>Select your size</p>
    <div class="size-grid" id="size-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm" onclick="confirmSize()" disabled>Add to Cart</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBppxK5_6DikJAHl7QqbrQxjdP8_P6cDBA",
  authDomain: "klight-f6067.firebaseapp.com",
  projectId: "klight-f6067",
  storageBucket: "klight-f6067.firebasestorage.app",
  messagingSenderId: "374626545204",
  appId: "1:374626545204:web:7bc79b81206aea8f3be461"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const SIZES      = ['UK 6','UK 7','UK 8','UK 9','UK 10','UK 11','UK 12'];
const PHONE      = '254721698932';
const DELIVERY   = 300;
const MPESA_URL  = 'https://your-backend-url/stkpush'; // ← replace with your backend URL

/* LOAD SAVED CART — use in-memory fallback if localStorage unavailable */
let cart = [];
try { cart = JSON.parse(localStorage.getItem("cart")) || []; } catch(e) { cart = []; }

/* PRODUCTS — ratings & stock fixed at init, not randomized on each render */
let products = [
  {
    id:1, name:"Nike Air Force 1", price:8500, category:"nike",
    badge:"BEST SELLER",
    images:[
      "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500&q=80",
      "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&q=80"
    ],
    desc:"Classic white leather upper with rubber sole"
  },
  {
    id:2, name:"Adidas Ultraboost", price:7800, category:"adidas",
    badge:"SALE",
    images:[
      "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80",
      "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=500&q=80"
    ],
    desc:"Breathable knit upper with responsive cushioning"
  },
  {
    id:3, name:"Jordan 1 Retro", price:12000, category:"jordan",
    badge:"HOT",
    images:[
      "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=500&q=80",
      "https://images.unsplash.com/photo-1600180758895-6f35a62b79b0?w=500&q=80"
    ],
    desc:"Premium leather high-top street classic"
  },
  {
    id:4, name:"Classic Leather Shoe", price:6500, category:"leather",
    images:[
      "https://images.unsplash.com/photo-1595341888016-a392ef81b7de?w=500&q=80",
      "https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=500&q=80"
    ],
    desc:"Smart office leather for formal wear"
  }
];

/* Fix: assign rating & stock once at init, not on every render */
products = products.map(p => ({
  ...p,
  rating: (Math.random() * 1 + 4).toFixed(1),
  stock: Math.floor(Math.random() * 10) + 1
}));

let filtered = [...products];

/* FILTER */
function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtered = cat === 'all' ? [...products] : products.filter(p => p.category === cat);
  displayProducts();
}

/* DISPLAY PRODUCTS */
function displayProducts() {
  const c = document.getElementById("products");
  c.innerHTML = `<div class="empty-state">Loading shoes...</div>`;

  setTimeout(() => {
    c.innerHTML = "";

    if (filtered.length === 0) {
      c.innerHTML = `<div class="empty-state">🔍 No shoes found.</div>`;
      return;
    }

    filtered.forEach(p => {
      const oldPrice = Math.round(p.price * 1.25);
      const badgeClass = p.badge === 'HOT' ? 'hot' : p.badge === 'SALE' ? 'sale' : '';

      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <div class="card-img-wrap">
          <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
          ${p.badge ? `<span class="card-badge ${badgeClass}">${p.badge}</span>` : ""}
          <button class="quick-add" onclick="quickAdd(event,${p.id})">+ Quick Add</button>
        </div>
        <div class="card-body">
          <div class="rating">⭐ ${p.rating}</div>
          <h4>${p.name}</h4>
          <p class="price">KSh ${p.price.toLocaleString()}</p>
          <div class="old-price">KSh ${oldPrice.toLocaleString()}</div>
          <small>⚠️ Only ${p.stock} left</small>
        </div>`;

      div.onclick = () => openModal(p.id);
      c.appendChild(div);
    });
  }, 300);
}

/* SIZE MODAL STATE */
let modalProductId = null;
let selectedSize = null;

function openModal(id) {
  const p = products.find(x => x.id === id);
  modalProductId = id;
  selectedSize = null;

  document.getElementById('modal-product-name').textContent = p.name;
  document.getElementById('modal-confirm').disabled = true;

  const grid = document.getElementById('size-grid');
  grid.innerHTML = '';
  SIZES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'size-btn';
    btn.textContent = s;
    btn.onclick = () => selectSize(s, btn);
    grid.appendChild(btn);
  });

  document.getElementById('size-modal').classList.add('open');
}

function selectSize(size, btn) {
  selectedSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('modal-confirm').disabled = false;
}

function closeModal() {
  document.getElementById('size-modal').classList.remove('open');
  modalProductId = null;
  selectedSize = null;
}

function confirmSize() {
  if (!selectedSize || !modalProductId) return;
  const p = products.find(x => x.id === modalProductId);
  cart.push({ ...p, size: selectedSize });
  saveCart();
  updateCartUI();
  showToast(`✅ ${p.name} (${selectedSize}) added`);
  closeModal();
}

/* Close modal on overlay click */
document.getElementById('size-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* QUICK ADD — opens modal too for proper size selection */
function quickAdd(e, id) {
  e.stopPropagation();
  openModal(id);
}

/* CART */
function saveCart() {
  try { localStorage.setItem("cart", JSON.stringify(cart)); } catch(e) {}
}

function updateCartUI() {
  let subtotal = 0;
  const wrap = document.getElementById("cart-items");
  wrap.innerHTML = "";

  if (cart.length === 0) {
    wrap.innerHTML = `<div class="cart-empty">Your cart is empty</div>`;
  } else {
    cart.forEach((p, i) => {
      subtotal += p.price;
      const item = document.createElement('div');
      item.className = 'cart-item';
      item.innerHTML = `
        <div>
          <strong>${p.name}</strong>
          <small>${p.size}</small>
        </div>
        <span>KSh ${p.price.toLocaleString()}</span>
        <button onclick="removeFromCart(${i})" title="Remove">✕</button>`;
      wrap.appendChild(item);
    });
  }

  const total = subtotal + DELIVERY;
  document.getElementById("subtotal").textContent = subtotal.toLocaleString();
  document.getElementById("total").textContent = total.toLocaleString();

  const count = cart.length;
  document.getElementById("cart-count").textContent = count;
  document.getElementById("cart-count-2").textContent = count;
  document.getElementById("checkout-btn").disabled = count === 0;

  saveCart();
}

function removeFromCart(i) {
  const name = cart[i].name;
  cart.splice(i, 1);
  updateCartUI();
  showToast(`🗑️ ${name} removed`);
}

/* CHECKOUT — 1) save to Firestore  2) trigger M-Pesa STK Push  3) send WhatsApp */
async function checkout() {
  const name     = document.getElementById("cust-name").value.trim();
  const location = document.getElementById("cust-location").value.trim();
  const phone    = document.getElementById("cust-phone").value.trim();

  if (!name || !location || !phone) { showToast("⚠️ Please fill in all fields"); return; }
  if (cart.length === 0) { showToast("⚠️ Your cart is empty"); return; }

  /* Normalize phone: strip spaces/dashes/+, must be 9-12 digits */
  const rawPhone = phone.replace(/[\s\-\+]/g, '');
  if (!/^\d{9,12}$/.test(rawPhone)) {
    showToast("⚠️ Enter a valid phone number e.g. 0712345678");
    return;
  }
  /* Convert to 2547XXXXXXXX format for M-Pesa & WhatsApp */
  const mpesaPhone = rawPhone.startsWith('0')
    ? '254' + rawPhone.slice(1)
    : rawPhone.startsWith('254') ? rawPhone : '254' + rawPhone;

  const subtotal = cart.reduce((s, p) => s + p.price, 0);
  const total    = subtotal + DELIVERY;
  const orderId  = "KK" + Math.floor(Math.random() * 100000);

  const btn = document.getElementById("checkout-btn");
  const resetBtn = () => {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg> Order via WhatsApp`;
  };

  btn.disabled = true;
  btn.textContent = "Saving order...";

  /* STEP 1 — Save to Firestore */
  try {
    await addDoc(collection(db, "orders"), {
      orderId,
      customer: { name, location, phone: mpesaPhone },
      items: cart.map(p => ({ id: p.id, name: p.name, size: p.size, price: p.price })),
      subtotal,
      delivery: DELIVERY,
      total,
      status: "pending",
      createdAt: serverTimestamp()
    });
  } catch(err) {
    console.error("Firestore:", err);
    showToast("⚠️ Could not save order — continuing anyway");
  }

  /* STEP 2 — M-Pesa STK Push */
  btn.textContent = "Sending payment request...";
  let mpesaSuccess = false;
  try {
    const res = await fetch(MPESA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: mpesaPhone, amount: total, orderId })
    });
    if (res.ok) {
      mpesaSuccess = true;
      showToast("📲 M-Pesa prompt sent to " + phone + "!");
    } else {
      const err = await res.json().catch(() => ({}));
      console.error("STK Push error:", err);
      showToast("⚠️ M-Pesa failed — completing via WhatsApp");
    }
  } catch(err) {
    console.error("STK Push:", err);
    /* Backend not set up yet — silently fall through to WhatsApp */
  }

  /* STEP 3 — WhatsApp fallback (always fires; shows payment status) */
  let msg = `🛒 *NEW ORDER — Klight Kicks*\n`;
  msg += `🧾 Order ID: ${orderId}\n`;
  msg += `━━━━━━━━━━━━━━━\n`;
  msg += `👤 ${name}\n📍 ${location}\n📞 ${mpesaPhone}\n\n`;
  cart.forEach(p => { msg += `• ${p.name} (${p.size}) — KSh ${p.price.toLocaleString()}\n`; });
  msg += `━━━━━━━━━━━━━━━\n`;
  msg += `Subtotal: KSh ${subtotal.toLocaleString()}\n`;
  msg += `Delivery: KSh ${DELIVERY.toLocaleString()}\n`;
  msg += `*Total: KSh ${total.toLocaleString()}*\n`;
  msg += mpesaSuccess ? `💳 M-Pesa STK sent ✅\n` : `💳 Payment: pending\n`;

  resetBtn();
  window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`, "_blank");
}

/* TOAST */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2500);
}

/* INIT */
displayProducts();
updateCartUI();

/* EXPOSE to window so HTML onclick="" attributes work from module scope */
window.filterProducts  = filterProducts;
window.quickAdd        = quickAdd;
window.openModal       = openModal;
window.closeModal      = closeModal;
window.confirmSize     = confirmSize;
window.removeFromCart  = removeFromCart;
window.checkout        = checkout;
</script>
