<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klight Kicks</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* SAME UI (kept clean & optimized) */
:root {
  --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e;
  --border:rgba(255,255,255,0.08);
  --accent:#e8ff47; --accent2:#ff4747;
  --text:#f0f0f0; --muted:#888;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:1rem;border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--font-display);font-size:28px;color:var(--accent);}
.cart-btn{background:var(--accent);padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600}

/* HERO */
.hero{padding:2rem}
.hero h1{font-family:var(--font-display);font-size:60px}
.hero em{color:var(--accent);font-style:normal}

/* PRODUCTS */
#products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;padding:1rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:200px;object-fit:cover}
.card-body{padding:10px}
.price{color:var(--accent);font-weight:700}

/* CART */
.cart{padding:1rem;border-top:1px solid var(--border)}
button{cursor:pointer}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">KLIGHT KICKS</div>
  <button class="cart-btn">Cart (<span id="count">0</span>)</button>
</nav>

<div class="hero">
  <h1>STEP INTO <em>FIRE</em></h1>
</div>

<div id="products"></div>

<div class="cart">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <p>Total: KSh <span id="total">0</span></p>
  <button onclick="checkout()">Order via WhatsApp</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBppxK5_6DikJAHl7QqbrQxjdP8_P6cDBA",
authDomain: "klight-f6067.firebaseapp.com",
projectId: "klight-f6067"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PHONE = "254721698932";

let products = [
  {id:1,name:"Nike Air Force 1",price:8500,img:"https://images.unsplash.com/photo-1549298916-b41d501d3772"},
  {id:2,name:"Adidas Ultraboost",price:7800,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
  {id:3,name:"Jordan 1",price:12000,img:"https://images.unsplash.com/photo-1552346154-21d32810aba3"}
];

let cart = [];

function renderProducts(){
  const wrap = document.getElementById("products");
  wrap.innerHTML="";
  products.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${p.img}">
      <div class="card-body">
        <h4>${p.name}</h4>
        <p class="price">KSh ${p.price}</p>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>`;
    wrap.appendChild(div);
  });
}

function addToCart(id){
  const p = products.find(x=>x.id===id);
  cart.push(p);
  updateCart();
}

function updateCart(){
  document.getElementById("count").textContent=cart.length;
  const wrap=document.getElementById("cart-items");
  wrap.innerHTML="";
  let total=0;

  cart.forEach(p=>{
    total+=p.price;
    wrap.innerHTML+=`<div>${p.name} - ${p.price}</div>`;
  });

  document.getElementById("total").textContent=total;
}

async function checkout(){
  if(cart.length===0){alert("Cart empty");return;}

  const total = cart.reduce((s,p)=>s+p.price,0);

  try{
    await addDoc(collection(db,"orders"),{
      items:cart,
      total,
      createdAt:serverTimestamp()
    });
  }catch(e){
    console.log(e);
  }

  let msg="NEW ORDER:\n";
  cart.forEach(p=>msg+=`${p.name} - ${p.price}\n`);
  msg+=`Total: ${total}`;

  await fetch("https://your-backend-url/stkpush", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    phone,
    amount: total,
    orderId
  })
});

showToast("📲 Payment request sent to your phone!");
}

renderProducts();

window.addToCart = addToCart;
window.checkout = checkout;

</script>

</body>
</html>
