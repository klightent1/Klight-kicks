<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klight Kicks Kenya | Premium Footwear</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* (YOUR CSS — unchanged, already perfect) */
:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#1a1a1a;
  --border:#2a2a2a;
  --accent:#ff5c00;
  --accent2:#ff8c42;
  --text:#f0f0f0;
  --muted:#888;
  --white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">Klight <span>Kicks</span> KE</div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search shoes…" oninput="searchProducts()">
  </div>

  <button class="cart-btn" onclick="scrollToCart()">
    🛒 Cart
    <span class="cart-badge" id="cart-count">0</span>
  </button>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Klight <span>Kicks</span><br>Kenya.</h1>
    <p>Premium sneakers • Pay via MPESA • Fast Nairobi delivery</p>
  </div>

  <div class="hero-stat">
    <div class="stat"><strong>8+</strong><small>Brands</small></div>
    <div class="stat"><strong>KSh</strong><small>From 1,800</small></div>
    <div class="stat"><strong>24h</strong><small>Delivery</small></div>
  </div>
</div>

<!-- MAIN -->
<div class="layout">

  <div class="main">

    <div class="filters">
      <button class="pill active" onclick="filterCategory('all',this)">All</button>
      <button class="pill" onclick="filterCategory('nike',this)">Nike</button>
      <button class="pill" onclick="filterCategory('adidas',this)">Adidas</button>
      <button class="pill" onclick="filterCategory('jordan',this)">Jordan</button>
      <button class="pill" onclick="filterCategory('leather',this)">Leather</button>
      <button class="pill" onclick="filterCategory('kids',this)">Kids</button>
      <button class="pill" onclick="filterCategory('school',this)">School</button>
      <button class="pill" onclick="filterCategory('sandals',this)">Sandals</button>
      <button class="pill" onclick="filterCategory('rubber',this)">Rubber</button>
    </div>

    <div class="products-grid" id="products"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="cart-sidebar">
    <div class="sidebar-title">
      Cart <span id="cart-count-2">0</span>
    </div>

    <div class="cart-items-wrap" id="cart-items"></div>

    <div class="order-summary">
      <div class="order-row"><span>Subtotal</span><span>KSh <span id="subtotal">0</span></span></div>
      <div class="order-row"><span>Delivery</span><span>KSh 300</span></div>
      <div class="order-row total"><span>Total</span><span>KSh <span id="total">300</span></span></div>
    </div>

    <div class="checkout-form">
      <input type="text" id="cust-name" placeholder="Your Name">
      <input type="text" id="cust-location" placeholder="Delivery Location">
      <button class="btn-primary" id="checkout-btn" onclick="checkout()" disabled>
        📲 Order via WhatsApp
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SIZES = ['UK 6','UK 7','UK 8','UK 9','UK 10','UK 11','UK 12'];
const PHONE = '254721698932';
const DELIVERY = 300;

let products = [
{
id:1,
name:"Nike Air Force 1",
price:8500,
category:"nike",
img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&q=80",
desc:"Classic white AF1"
},
{
id:2,
name:"Adidas Ultraboost",
price:7800,
category:"adidas",
img:"https://images.unsplash.com/photo-1582582429416-2d1f9b93e14b?w=400&q=80",
desc:"Running comfort"
},
{
id:3,
name:"Jordan 1 Retro",
price:12000,
category:"jordan",
img:"https://images.unsplash.com/photo-1600180758895-6f35a62b79b0?w=400&q=80",
desc:"Street classic"
},
{
id:4,
name:"Classic Leather Shoe",
price:6500,
category:"leather",
img:"https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=400&q=80",
desc:"Formal wear"
},
{
id:5,
name:"Kids Sneakers",
price:2500,
category:"kids",
img:"https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?w=400&q=80",
desc:"Kids comfort"
},
{
id:6,
name:"School Shoes",
price:3000,
category:"school",
img:"https://images.unsplash.com/photo-1588361861040-ac9b1018f6d5?w=400&q=80",
desc:"School durability"
},
{
id:7,
name:"Ladies Sandals",
price:1800,
category:"sandals",
img:"https://images.unsplash.com/photo-1562183241-b937e95585b6?w=400&q=80",
desc:"Comfort sandals"
},
{
id:8,
name:"Work Boots",
price:4000,
category:"rubber",
img:"https://images.unsplash.com/photo-1600185365923-3a2ce3cdb9eb?w=400&q=80",
desc:"Heavy duty boots"
}
];

let filtered=[...products];
let cart=[];
let selectedProduct=null;

/* DISPLAY */
function displayProducts(){
const c=document.getElementById("products");
c.innerHTML="";
filtered.forEach(p=>{
const div=document.createElement('div');
div.className='card';
div.onclick=()=>viewProduct(p.id);
div.innerHTML=`
<img src="${p.img}">
<h4>${p.name}</h4>
<p>KSh ${p.price}</p>`;
c.appendChild(div);
});
}

/* MODAL */
function viewProduct(id){
const p=products.find(x=>x.id===id);
selectedProduct=p;

const sizeOptions=SIZES.map(s=>`<option>${s}</option>`).join("");

document.body.insertAdjacentHTML("beforeend",`
<div id="productModal">
<h3>${p.name}</h3>
<select id="modal-size">${sizeOptions}</select>
<button onclick="addToCartFromModal()">Add</button>
<button onclick="closeProduct()">Close</button>
</div>
`);
}

function closeProduct(){
document.getElementById("productModal")?.remove();
}

function addToCartFromModal(){
const size=document.getElementById("modal-size").value;
cart.push({...selectedProduct,size});
updateCartUI();
closeProduct();
showToast("Added to cart");
}

/* CART */
function updateCartUI(){
let subtotal=0;
const wrap=document.getElementById("cart-items");
wrap.innerHTML="";

cart.forEach((p,i)=>{
subtotal+=p.price;
wrap.innerHTML+=`<p>${p.name} (${p.size})</p>`;
});

const total=subtotal+DELIVERY;
document.getElementById("subtotal").innerText=subtotal;
document.getElementById("total").innerText=total;

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("cart-count-2").innerText=cart.length;

document.getElementById("checkout-btn").disabled=cart.length===0;
}

/* CHECKOUT */
function checkout(){
let name=document.getElementById("cust-name").value;
let location=document.getElementById("cust-location").value;

let msg=`🛒 *NEW ORDER - Klight Kicks Kenya*\n\n`;
msg+=`Name: ${name}\nLocation: ${location}\n\nItems:\n`;

cart.forEach(p=>{
msg+=`${p.name} (${p.size}) - ${p.price}\n`;
});

window.open("https://wa.me/"+PHONE+"?text="+encodeURIComponent(msg));
}

/* TOAST */
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

displayProducts();
updateCartUI();
</script>

</body>
</html>
