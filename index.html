<script>
const SIZES    = ['UK 6','UK 7','UK 8','UK 9','UK 10','UK 11','UK 12'];
const PHONE    = '254721698932';
const DELIVERY = 300;

/* LOAD SAVED CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* PRODUCTS */
let products = [
  {
    id:1, name:"Nike Air Force 1", price:8500, category:"nike",
    badge:"BEST SELLER",
    images:[
      "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500&q=80",
      "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&q=80"
    ],
    desc:"Classic white leather upper with rubber sole"
  },
  {
    id:2, name:"Adidas Ultraboost", price:7800, category:"adidas",
    badge:"SALE",
    images:[
      "https://images.unsplash.com/photo-1582582429416-b41d501d3772?w=500&q=80",
      "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=500&q=80"
    ],
    desc:"Breathable knit upper with responsive cushioning"
  },
  {
    id:3, name:"Jordan 1 Retro", price:12000, category:"jordan",
    badge:"HOT",
    images:[
      "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=500&q=80",
      "https://images.unsplash.com/photo-1600180758895-6f35a62b79b0?w=500&q=80"
    ],
    desc:"Premium leather high-top street classic"
  },
  {
    id:4, name:"Classic Leather Shoe", price:6500, category:"leather",
    images:[
      "https://images.unsplash.com/photo-1595341888016-a392ef81b7de?w=500&q=80",
      "https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=500&q=80"
    ],
    desc:"Smart office leather for formal wear"
  }
];

/* RATINGS */
products = products.map(p => ({
  ...p,
  rating: (Math.random() * 1 + 4).toFixed(1)
}));

let filtered = [...products];
let selectedProduct = null;

/* DISPLAY PRODUCTS */
function displayProducts(){
  const c = document.getElementById("products");

  c.innerHTML = `<div class="empty-state">Loading shoes...</div>`;

  setTimeout(()=>{
    c.innerHTML = "";

    if(filtered.length === 0){
      c.innerHTML = `<div class="empty-state"><span class="emoji">🔍</span>No shoes found.</div>`;
      return;
    }

    filtered.forEach(p => {
      const stock = Math.floor(Math.random()*10)+1;
      const oldPrice = Math.round(p.price * 1.25);

      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
      <div class="card-img-wrap">
        <img src="${p.images[0]}" alt="${p.name}">
        ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ""}
        <button class="quick-add" onclick="quickAdd(event,${p.id})">+ Add</button>
      </div>
      <div class="card-body">
        <div class="rating">⭐ ${p.rating}</div>
        <h4>${p.name}</h4>
        <p class="price">KSh ${p.price.toLocaleString()}</p>
        <div class="old-price">KSh ${oldPrice.toLocaleString()}</div>
        <small>⚠️ Only ${stock} left</small>
      </div>`;

      div.onclick = () => viewProduct(p.id);
      c.appendChild(div);
    });

    window.scrollTo({top:0, behavior:"smooth"});
  },300);
}

/* QUICK ADD */
function quickAdd(e,id){
  e.stopPropagation();
  const p = products.find(x=>x.id===id);
  const size = SIZES[Math.floor(Math.random()*SIZES.length)];
  cart.push({...p,size});
  updateCartUI();
  showToast(`🛒 ${p.name} added (${size})`);
}

/* VIEW PRODUCT (FIXED missing function) */
function viewProduct(id){
  const p = products.find(x=>x.id===id);
  const size = prompt("Enter size (UK 6 - UK 12):");
  if(!size) return;

  cart.push({...p,size});
  updateCartUI();
  showToast(`✅ ${p.name} added`);
}

/* CART */
function updateCartUI(){
  let subtotal = 0;
  const wrap = document.getElementById("cart-items");
  wrap.innerHTML = "";

  if(cart.length===0){
    wrap.innerHTML = `<div class="cart-empty">Empty cart</div>`;
  } else {
    cart.forEach((p,i)=>{
      subtotal += p.price;

      const item = document.createElement('div');
      item.className = 'cart-item';

      item.innerHTML = `
        <div>
          <strong>${p.name}</strong>
          <small>${p.size}</small>
        </div>
        <span>KSh ${p.price.toLocaleString()}</span>
        <button onclick="removeFromCart(${i})">✕</button>`;

      wrap.appendChild(item);
    });
  }

  const total = subtotal + DELIVERY;

  document.getElementById("subtotal").innerText = subtotal.toLocaleString();
  document.getElementById("total").innerText = total.toLocaleString();
  document.getElementById("cart-count").innerText = cart.length;
  document.getElementById("cart-count-2").innerText = cart.length;

  document.getElementById("checkout-btn").disabled = cart.length===0;

  /* SAVE CART */
  localStorage.setItem("cart", JSON.stringify(cart));
}

function removeFromCart(i){
  const name = cart[i].name;
  cart.splice(i,1);
  updateCartUI();
  showToast(`🗑️ ${name} removed`);
}

/* CHECKOUT */
function checkout(){
  const name = document.getElementById("cust-name").value.trim();
  const location = document.getElementById("cust-location").value.trim();
  const phone = document.getElementById("cust-phone").value.trim();

  if(!name || !location || !phone){
    showToast("⚠️ Fill all fields");
    return;
  }

  if(cart.length === 0){
    showToast("⚠️ Cart is empty");
    return;
  }

  const subtotal = cart.reduce((s,p)=>s+p.price,0);
  const total = subtotal + DELIVERY;
  const orderId = "KK"+Math.floor(Math.random()*100000);

  let msg = `🛒 *NEW ORDER — Klight Kicks*\n`;
  msg += `🧾 Order ID: ${orderId}\n`;
  msg += `━━━━━━━━━━━━━━━\n`;
  msg += `👤 ${name}\n📍 ${location}\n📞 ${phone}\n\n`;

  cart.forEach(p=>{
    msg += `• ${p.name} (${p.size}) - KSh ${p.price.toLocaleString()}\n`;
  });

  msg += `━━━━━━━━━━━━━━━\n`;
  msg += `Total: KSh ${total.toLocaleString()}\n`;

  window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`,"_blank");
}

/* TOAST */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"),2500);
}

/* INIT */
displayProducts();
updateCartUI();
</script>
