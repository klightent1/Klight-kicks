<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klight Kicks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --orange: #ff5c00;
    --orange-dark: #cc4900;
    --gray: #1c1c1c;
    --gray-mid: #2e2e2e;
    --gray-light: #888;
    --card-bg: #161616;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* ── NAVBAR ── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: var(--black);
    border-bottom: 1px solid var(--gray-mid);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--orange);
    white-space: nowrap;
  }

  .search {
    display: flex;
    flex: 1;
    max-width: 380px;
  }

  .search input {
    flex: 1;
    padding: 10px 14px;
    background: var(--gray);
    border: 1px solid var(--gray-mid);
    border-right: none;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    border-radius: var(--radius) 0 0 var(--radius);
  }

  .search input::placeholder { color: var(--gray-light); }

  .search button {
    padding: 10px 18px;
    background: var(--orange);
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: background .2s;
  }

  .search button:hover { background: var(--orange-dark); }

  .nav-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .cart-btn {
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    background: var(--gray);
    border: 1px solid var(--gray-mid);
    color: var(--white);
    padding: 10px 18px;
    border-radius: var(--radius);
    transition: background .2s, border-color .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cart-btn:hover { background: var(--gray-mid); border-color: var(--orange); }

  #cart-count {
    background: var(--orange);
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .add-product-btn {
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--orange);
    color: var(--orange);
    padding: 10px 16px;
    border-radius: var(--radius);
    transition: background .2s, color .2s;
  }

  .add-product-btn:hover { background: var(--orange); color: white; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 10px;
    padding: 18px 28px;
    background: var(--black);
    border-bottom: 1px solid var(--gray-mid);
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 20px;
    border: 1px solid var(--gray-mid);
    background: transparent;
    color: var(--gray-light);
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all .2s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--orange);
    color: var(--white);
    background: var(--orange);
  }

  /* ── PRODUCTS GRID ── */
  .products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 28px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--gray-mid);
    display: flex;
    flex-direction: column;
    transition: transform .25s, border-color .25s, box-shadow .25s;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--orange);
    box-shadow: 0 8px 30px rgba(255, 92, 0, 0.15);
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
    height: 190px;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .4s;
  }

  .card:hover img { transform: scale(1.06); }

  .card-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--orange);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 99px;
    text-transform: uppercase;
  }

  .card-body {
    padding: 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-body h4 {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }

  .price {
    color: var(--orange);
    font-weight: 700;
    font-size: 17px;
  }

  .size-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .size-row label {
    font-size: 12px;
    color: var(--gray-light);
    font-weight: 500;
  }

  .size-select {
    flex: 1;
    min-width: 80px;
    padding: 6px 10px;
    background: var(--gray);
    border: 1px solid var(--gray-mid);
    color: var(--white);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .size-select:focus { border-color: var(--orange); }

  .atc-btn {
    width: 100%;
    padding: 11px;
    background: var(--orange);
    border: none;
    color: white;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 4px;
  }

  .atc-btn:hover { background: var(--orange-dark); }
  .atc-btn:active { transform: scale(0.97); }

  /* ── CART DRAWER ── */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    backdrop-filter: blur(2px);
  }

  .cart-overlay.open { display: block; }

  .cart-drawer {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 360px;
    max-width: 100vw;
    background: var(--gray);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(110%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: -4px 0 40px rgba(0,0,0,0.5);
  }

  .cart-drawer.open { transform: translateX(0); }

  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--gray-mid);
  }

  .cart-header h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .cart-close {
    background: none;
    border: none;
    color: var(--gray-light);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color .2s;
  }

  .cart-close:hover { color: var(--white); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid var(--gray-mid);
  }

  .cart-item img {
    width: 54px;
    height: 54px;
    object-fit: cover;
    border-radius: 8px;
  }

  .cart-item-info { flex: 1; }

  .cart-item-info .ci-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
  }

  .cart-item-info .ci-meta {
    font-size: 11px;
    color: var(--gray-light);
    margin-top: 2px;
  }

  .cart-item-info .ci-price {
    font-size: 13px;
    color: var(--orange);
    font-weight: 700;
    margin-top: 3px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--gray-light);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color .2s;
    width: auto;
    margin: 0;
  }

  .remove-btn:hover { color: #ff4444; }

  .cart-empty {
    text-align: center;
    color: var(--gray-light);
    margin-top: 40px;
    font-size: 14px;
  }

  .cart-footer {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--gray-mid);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cart-totals {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    color: var(--gray-light);
  }

  .totals-row.grand {
    color: var(--white);
    font-weight: 700;
    font-size: 16px;
    border-top: 1px solid var(--gray-mid);
    padding-top: 8px;
    margin-top: 4px;
  }

  .cart-footer input {
    padding: 11px 14px;
    background: var(--card-bg);
    border: 1px solid var(--gray-mid);
    color: var(--white);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  .cart-footer input:focus { border-color: var(--orange); }
  .cart-footer input::placeholder { color: var(--gray-light); }

  .checkout-btn {
    width: 100%;
    padding: 14px;
    background: #25D366;
    border: none;
    color: white;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .2s, transform .1s;
  }

  .checkout-btn:hover { background: #1ebe57; }
  .checkout-btn:active { transform: scale(0.98); }

  /* ── ADD PRODUCT MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--gray);
    border-radius: var(--radius);
    padding: 28px;
    width: 400px;
    max-width: 95vw;
    border: 1px solid var(--gray-mid);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .modal input, .modal select {
    padding: 11px 14px;
    background: var(--card-bg);
    border: 1px solid var(--gray-mid);
    color: var(--white);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  .modal input:focus, .modal select:focus { border-color: var(--orange); }
  .modal input::placeholder { color: var(--gray-light); }

  .modal-actions { display: flex; gap: 10px; }

  .modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s;
    width: auto;
    margin: 0;
  }

  .btn-cancel {
    background: var(--card-bg);
    color: var(--gray-light);
    border: 1px solid var(--gray-mid) !important;
  }

  .btn-cancel:hover { color: var(--white); }

  .btn-add {
    background: var(--orange);
    color: white;
  }

  .btn-add:hover { background: var(--orange-dark); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--orange);
    color: white;
    padding: 12px 24px;
    border-radius: 99px;
    font-weight: 700;
    font-size: 14px;
    z-index: 400;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── EMPTY STATE ── */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-light);
  }

  .no-results span { font-size: 48px; display: block; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .navbar { flex-wrap: wrap; }
    .search { max-width: 100%; order: 3; flex: 0 0 100%; }
    .products { padding: 16px; gap: 16px; }
    .cart-drawer { width: 100vw; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Klight Kicks 👟</div>
  <div class="search">
    <input type="text" id="search" placeholder="Search sneakers..." oninput="searchProducts()">
    <button>🔍</button>
  </div>
  <div class="nav-actions">
    <button class="add-product-btn" onclick="openModal()">+ Add Product</button>
    <div class="cart-btn" onclick="toggleCart()">
      Cart 🛒 <span id="cart-count">0</span>
    </div>
  </div>
</nav>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="filterCategory('all', this)">All</button>
  <button class="filter-btn" onclick="filterCategory('nike', this)">Nike</button>
  <button class="filter-btn" onclick="filterCategory('adidas', this)">Adidas</button>
  <button class="filter-btn" onclick="filterCategory('jordan', this)">Jordan</button>
</div>

<!-- PRODUCTS GRID -->
<div class="products" id="products"></div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h3>Your Order 🛒</h3>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>

  <div class="cart-items" id="cart-items">
    <p class="cart-empty">Your cart is empty.</p>
  </div>

  <div class="cart-footer">
    <div class="cart-totals">
      <div class="totals-row"><span>Subtotal</span><span>KSh <span id="subtotal">0</span></span></div>
      <div class="totals-row"><span>Delivery</span><span>KSh 300</span></div>
      <div class="totals-row grand"><span>Total</span><span>KSh <span id="total">300</span></span></div>
    </div>
    <input id="cust-name" placeholder="Your Name" type="text">
    <input id="cust-location" placeholder="Delivery Location" type="text">
    <button class="checkout-btn" onclick="checkout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Order via WhatsApp
    </button>
  </div>
</div>

<!-- ADD PRODUCT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Add New Product</h3>
    <input id="m-name" placeholder="Product Name" type="text">
    <input id="m-price" placeholder="Price (KSh)" type="number" min="0">
    <select id="m-category">
      <option value="" disabled selected>Select Category</option>
      <option value="nike">Nike</option>
      <option value="adidas">Adidas</option>
      <option value="jordan">Jordan</option>
    </select>
    <input id="m-img" placeholder="Image URL" type="url">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="addProduct()">Add Product</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const SIZES = ['UK 6','UK 7','UK 8','UK 9','UK 10','UK 11','UK 12'];
  const PHONE = '254721698932';

  let products = [
    { id: 1, name: "Nike Air Force 1", price: 8500, category: "nike", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500&q=80" },
    { id: 2, name: "Adidas Ultraboost", price: 7800, category: "adidas", img: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&q=80" },
    { id: 3, name: "Jordan 1 Retro", price: 12000, category: "jordan", img: "https://images.unsplash.com/photo-1552346154-21d32810aba3?w=500&q=80" },
    { id: 4, name: "Nike Air Max 270", price: 9000, category: "nike", img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=500&q=80" }
  ];

  let nextId = 5;
  let filtered = [...products];
  let cart = [];
  let activeFilter = 'all';

  /* ── DISPLAY ── */
  function displayProducts() {
    const container = document.getElementById('products');
    if (filtered.length === 0) {
      container.innerHTML = `<div class="no-results"><span>👟</span>No sneakers found.</div>`;
      return;
    }
    container.innerHTML = filtered.map(p => `
      <div class="card">
        <div class="card-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/400x300/1c1c1c/888?text=No+Image'">
          <span class="card-badge">${p.category}</span>
        </div>
        <div class="card-body">
          <h4>${p.name}</h4>
          <p class="price">KSh ${p.price.toLocaleString()}</p>
          <div class="size-row">
            <label>Size:</label>
            <select class="size-select" id="size-${p.id}">
              <option value="" disabled selected>Pick size</option>
              ${SIZES.map(s => `<option value="${s}">${s}</option>`).join('')}
            </select>
          </div>
          <button class="atc-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  /* ── FILTER ── */
  function filterCategory(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = products.filter(p => {
      const matchCat = activeFilter === 'all' || p.category === activeFilter;
      const matchQ   = p.name.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    displayProducts();
  }

  function searchProducts() { applyFilters(); }

  /* ── CART ── */
  function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;

    const sizeEl = document.getElementById('size-' + id);
    const size = sizeEl ? sizeEl.value : '';

    if (!size) {
      showToast('Please select a size first!');
      sizeEl && sizeEl.focus();
      return;
    }

    cart.push({ ...product, size, cartId: Date.now() });
    updateCartUI();
    showToast(`${product.name} added to cart!`);
    if (sizeEl) sizeEl.value = '';
  }

  function removeFromCart(cartId) {
    cart = cart.filter(item => item.cartId !== cartId);
    updateCartUI();
  }

  function updateCartUI() {
    document.getElementById('cart-count').textContent = cart.length;

    const itemsEl = document.getElementById('cart-items');

    if (cart.length === 0) {
      itemsEl.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
      document.getElementById('subtotal').textContent = '0';
      document.getElementById('total').textContent = '300';
      return;
    }

    let subtotal = 0;
    itemsEl.innerHTML = cart.map(item => {
      subtotal += item.price;
      return `
        <div class="cart-item">
          <img src="${item.img}" alt="${item.name}" onerror="this.src='https://placehold.co/54x54/1c1c1c/888?text=?'">
          <div class="cart-item-info">
            <div class="ci-name">${item.name}</div>
            <div class="ci-meta">Size: ${item.size}</div>
            <div class="ci-price">KSh ${item.price.toLocaleString()}</div>
          </div>
          <button class="remove-btn" onclick="removeFromCart(${item.cartId})" title="Remove">✕</button>
        </div>
      `;
    }).join('');

    document.getElementById('subtotal').textContent = subtotal.toLocaleString();
    document.getElementById('total').textContent = (subtotal + 300).toLocaleString();
  }

  function toggleCart() {
    const drawer  = document.getElementById('cart-drawer');
    const overlay = document.getElementById('cart-overlay');
    const isOpen  = drawer.classList.contains('open');
    drawer.classList.toggle('open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
  }

  /* ── CHECKOUT ── */
  function checkout() {
    const name     = document.getElementById('cust-name').value.trim();
    const location = document.getElementById('cust-location').value.trim();

    if (cart.length === 0) { showToast('Your cart is empty!'); return; }
    if (!name)             { showToast('Please enter your name.'); return; }
    if (!location)         { showToast('Please enter your location.'); return; }

    const total = document.getElementById('total').textContent;

    let msg = `🛒 *NEW ORDER — Klight Kicks*\n\n`;
    msg += `*Name:* ${name}\n`;
    msg += `*Location:* ${location}\n\n`;
    msg += `*Items:*\n`;
    cart.forEach(p => { msg += `• ${p.name} (${p.size}) — KSh ${p.price.toLocaleString()}\n`; });
    msg += `\n*Delivery:* KSh 300`;
    msg += `\n*Total: KSh ${total}*\n\n`;
    msg += `💳 *PAYMENT*\nM-Pesa Paybill/Till: 0721698932\nName: Klight Kicks\n\nPlease send payment screenshot after ordering. Thank you! 🙏`;

    window.open('https://wa.me/' + PHONE + '?text=' + encodeURIComponent(msg));
  }

  /* ── ADD PRODUCT MODAL ── */
  function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    ['m-name','m-price','m-img'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-category').value = '';
  }

  function addProduct() {
    const name     = document.getElementById('m-name').value.trim();
    const price    = Number(document.getElementById('m-price').value);
    const category = document.getElementById('m-category').value;
    const img      = document.getElementById('m-img').value.trim();

    if (!name)               { showToast('Enter a product name.'); return; }
    if (!price || price <= 0){ showToast('Enter a valid price.'); return; }
    if (!category)           { showToast('Select a category.'); return; }
    if (!img)                { showToast('Enter an image URL.'); return; }

    products.push({ id: nextId++, name, price, category, img });
    applyFilters();
    closeModal();
    showToast(`${name} added!`);
  }

  /* ── TOAST ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // Init
  displayProducts();
</script>
</body>
</html>
