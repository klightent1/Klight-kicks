<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klight Kicks</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* NAVBAR */
.navbar {
  display:flex; justify-content:space-between; align-items:center;
  background:white; padding:10px 20px;
}
.logo { font-size:22px; font-weight:bold; }

.search input { padding:10px; width:250px; }
.search button { padding:10px; background:orange; border:none; }

.nav-links { display:flex; gap:15px; cursor:pointer; }

/* LAYOUT */
.container { display:flex; }

/* SIDEBAR */
.sidebar {
  width:200px; background:white; padding:10px;
}
.sidebar div { padding:10px; cursor:pointer; }
.sidebar div:hover { background:#eee; }

/* HERO */
.hero { flex:1; padding:10px; }
.hero img { width:100%; border-radius:10px; }

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px; padding:10px;
}
.card {
  background:white; padding:10px;
  border-radius:10px; text-align:center;
}
.card img { width:100%; }

button {
  background:orange; border:none;
  padding:8px; cursor:pointer;
}

/* CART */
.cart-box {
  position:fixed;
  right:10px;
  bottom:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:250px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
  <div class="logo">Klight Kicks 👟</div>

  <div class="search">
    <input type="text" placeholder="Search shoes...">
    <button>Search</button>
  </div>

  <div class="nav-links">
    <div>Account</div>
    <div>Help</div>
    <div onclick="toggleCart()">Cart 🛒 (<span id="cart-count">0</span>)</div>
  </div>
</div>

<!-- MAIN -->

<div class="container">

  <div class="sidebar">
    <div>👟 Sneakers</div>
    <div>🔥 Deals</div>
    <div>🏃 Sports</div>
    <div>💎 Premium</div>
  </div>

  <div class="hero">
    <img src="https://via.placeholder.com/800x300?text=BIG+SALE+UP+TO+50%">
  </div>

</div>

<!-- PRODUCTS -->

<div class="products" id="products"></div>

<!-- CART -->

<div class="cart-box" id="cart" style="display:none;">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <h4>Total: $<span id="total">0</span></h4>
  <button onclick="checkout()">Order via WhatsApp</button>
</div>

<script>
const products = [
  {name:"Nike Air Max", price:120, img:"https://via.placeholder.com/200"},
  {name:"Adidas Ultraboost", price:110, img:"https://via.placeholder.com/200"},
  {name:"Jordan 4", price:150, img:"https://via.placeholder.com/200"},
  {name:"Puma RS-X", price:90, img:"https://via.placeholder.com/200"}
];

let cart = [];

function displayProducts() {
  let container = document.getElementById("products");
  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(index) {
  cart.push(products[index]);
  document.getElementById("cart-count").innerText = cart.length;
  updateCart();
}

function updateCart() {
  let items = document.getElementById("cart-items");
  let total = 0;
  items.innerHTML = "";

  cart.forEach(p => {
    items.innerHTML += `<p>${p.name} - $${p.price}</p>`;
    total += p.price;
  });

  document.getElementById("total").innerText = total;
}

function toggleCart() {
  let cartBox = document.getElementById("cart");
  cartBox.style.display = cartBox.style.display === "none" ? "block" : "none";
}

function checkout() {
  let message = "Hello, I want to order:%0A";
  cart.forEach(p => {
    message += `${p.name} - $${p.price}%0A`;
  });

  window.open("https://wa.me/254721698932?text=" + message);
}

displayProducts();
</script>

</body>
</html>
